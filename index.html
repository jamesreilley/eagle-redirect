<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Opening in Eagle…</title>
<style>
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
    color: #eaeaea;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .box {
    text-align: center;
    max-width: 360px;
    padding: 24px;
  }
  h1 {
    font-size: 16px;
    font-weight: 600;
    margin: 0 0 8px;
  }
  p {
    font-size: 13px;
    color: #999;
    margin: 0 0 16px;
    line-height: 1.5;
  }
  a#btn {
    display: inline-block;
    background: #5b8def;
    color: white;
    text-decoration: none;
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  a#btn:hover { background: #4a7bd9; }
  .error { color: #ff6b6b; }
  #btn[hidden] { display: none; }
</style>
</head>
<body>
  <div class="box">
    <h1 id="heading">Opening in Eagle…</h1>
    <p id="sub">Redirecting — if Eagle doesn't open automatically, click below.</p>
    <a id="btn" href="#" hidden>Open in Eagle</a>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var id = params.get('id');
      var heading = document.getElementById('heading');
      var sub = document.getElementById('sub');
      var btn = document.getElementById('btn');

      if (!id) {
        heading.className = 'error';
        heading.textContent = 'Missing item ID';
        sub.textContent = 'This link is missing the ?id= parameter. Open Eagle directly and find your item there.';
        return;
      }

      var eagleUrl = 'eagle://item/' + encodeURIComponent(id);

      // Show the manual button immediately so there's always something
      // visible even if the tab blanks briefly during the redirect attempt.
      btn.href = eagleUrl;
      btn.removeAttribute('hidden');

      // Delay the auto-redirect by 300ms so the page has time to render
      // before Chrome potentially blanks it during the protocol handoff.
      setTimeout(function () {
        window.location.href = eagleUrl;
        // Attempt to close the tab after Eagle has received the handoff.
        // Only works if Notion opened this in a new tab (script-opened window).
        // Silently ignored otherwise — no error, nothing breaks.
        setTimeout(function () {
          window.close();
        }, 1000);
      }, 300);
    })();
  </script>
</body>
</html>
